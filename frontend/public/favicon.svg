<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Doorframe -->
  <rect x="8" y="14" width="32" height="30" rx="1.5"
        fill="none" stroke="#10b981" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Door parted seam (slightly off-center to suggest the door swinging open) -->
  <line x1="24" y1="16" x2="24" y2="42"
        stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Door handle on the closed half -->
  <circle cx="33" cy="29" r="1.3" fill="#10b981"/>

  <!-- Music note rising from the door -->
  <g fill="#10b981">
    <ellipse cx="20" cy="10" rx="3" ry="2.4" transform="rotate(-22 20 10)"/>
    <rect x="22" y="2" width="1.6" height="10"/>
    <path d="M 22.8 2 Q 28 3 26.8 8 Q 25.5 5 22.8 6 Z"/>
  </g>
</svg>
