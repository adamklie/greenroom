# Pre-commit hooks for greenroom.
# Run `pre-commit install` once to wire these in locally.
#
# Pytest is intentionally NOT a hook — keep commits fast. CI runs the suite.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(ts|tsx|js|jsx|json|md|yaml|yml)$
        exclude: ^(backend/|.*\.lock$|.*\.min\.(js|css)$)
