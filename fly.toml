# Fly.io configuration for greenroom.
#
# This is a STARTING POINT for Phase 3d, not a deploy-ready config.
# Phase 3d will:
#   1. Run `fly apps create greenroom` (or similar) — may need a unique name
#   2. Run `fly volumes create data --region <region> --size 3`
#   3. Run `fly secrets set R2_ACCOUNT_ID=... R2_ACCESS_KEY_ID=... ...`
#      RESEND_API_KEY=... GREENROOM_AUTH_SECRET=...
#      GREENROOM_ALLOWED_ORIGINS=https://greenroom.<domain>
#      GREENROOM_PUBLIC_URL=https://greenroom.<domain>
#   4. `flyctl deploy`
#
# Secrets NEVER live in this file — they're set via `fly secrets set` and
# surface inside the machine as plain env vars, just like compose's
# `environment:` block.

app = "greenroom"               # rename to whatever `fly apps create` returns
primary_region = "sea"          # change to the region closest to you

[build]
  dockerfile = "Dockerfile"

# Non-secret env baked into the deployment. Anything sensitive
# (R2 keys, AUTH_SECRET, RESEND_API_KEY) goes through `fly secrets set`.
[env]
  PORT = "8080"
  GREENROOM_DB_PATH = "/data/greenroom.db"
  GREENROOM_VAULT_DIR = "/data/vault"
  GREENROOM_STATIC_DIR = "/app/static"
  GREENROOM_MEDIA_BACKEND = "r2"
  GREENROOM_AUTH_REQUIRED = "true"
  GREENROOM_EMAIL_BACKEND = "resend"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep at least one machine running so /api/health responds immediately
  # — auto-stop savings aren't worth the cold-start latency for an app
  # this small.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "data"
  destination = "/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
